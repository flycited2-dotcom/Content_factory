# Пример плана задач (вариант B — файл). То же можно командой боту (вариант A):
#   /plan 10 кондиционеры завтра 10:00,14:00 mode=mcp
# Планировщик берёт «дозревшие» по времени задачи и исполняет.

tasks:
  - id: "ac-mon-morning"
    filter:                       # что брать из источника
      categories: [2]             # настенные сплит-системы
      source: "breeze"            # опц.: конкретный поставщик
      # series_whitelist: [...]   # опц.: только эти серии (как selected_series в avito)
    count: 10                     # сколько товаров за прогон
    mode: "mcp"                   # стиль карточки
    channel: "@your_channel"      # куда (по умолчанию из конфига)
    schedule:                     # когда публиковать (локальное время сервера)
      - "2026-06-26 10:00"
      - "2026-06-26 14:00"

  - id: "fridges-weekly"
    filter:
      categories: [42]            # пример: холодильники (id уточнить в oasis)
    count: 5
    mode: "mcp"
    schedule:
      cron: "0 11 * * 1-5"        # будни в 11:00 (альтернатива списку времён)

# Поведение:
# - один товар публикуется один раз (анти-дубль по state);
# - публикуется только с готовой карточкой и пройденной ревизией;
# - не хватило «созревших» карточек к времени — публикуется столько, сколько готово, остальное в след. окно.
