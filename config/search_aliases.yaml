# Словарь синонимов и транслита для поиска (/find, /make). Пополняй свободно —
# применяется сразу, без рестарта бота.
#
# Формат:  <как пишет пользователь>: [<что искать в наименовании прайса>, ...]
#   • значение может быть фразой — тогда в наименовании должны найтись все её слова
#     (напр. «стиральная машина» ⇒ нужны и «стиральн», и «машин»);
#   • падежи/окончания учитываются автоматически (ключ и значения — по основе слова);
#   • можно несколько вариантов в списке (сработает любой).

# ── бытовая техника: разговорное → как в прайсе ──────────────────────────────
стиралка: [стиральная машина]
машинка: [стиральная машина]
микроволновка: [микроволновая печь, свч]
свч: [микроволновая печь]
холодос: [холодильник]
морозилка: [морозильник, морозильная камера, морозильный ларь]
камера: [камера, ларь]        # «морозильная камера» находит и лари
телек: [телевизор]
телик: [телевизор]
кондей: [кондиционер, сплит-система]
кондиционер: [сплит-система]
сплит: [сплит-система, кондиционер]
посудомойка: [посудомоечная машина]
духовка: [духовой шкаф]
варочная: [варочная панель]
вытяжка: [вытяжка]
бойлер: [водонагреватель]
водогрей: [водонагреватель]
пылик: [пылесос]
мультиварка: [мультиварка]
шуруповёрт: [шуруповерт]
болгарка: [углошлифовальная, ушм, шлифмашина угловая]
перфоратор: [перфоратор]

